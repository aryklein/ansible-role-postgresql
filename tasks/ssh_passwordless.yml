---

- name: COMMON TASKS | create SSH key-pair for passwordless ssh between nodes
  user:
    name: "{{ pg_system_user }}"
    generate_ssh_key: yes

- name: COMMON TASKS | fetch all public ssh keys
  slurp:
    src: "{{ pg_user_home }}/.ssh/id_rsa.pub"
  register: ssh_key

- name: COMMON TASKS | deploy keys on all nodes
  authorized_key:
    user: "{{ pg_system_user }}"
    key: "{{ item[0] }}"
  delegate_to: "{{ item[1] }}"
  when: item[1] != inventory_hostname
  with_nested:
    - "{{ ssh_key['content'] | b64decode }}"
    - "{{ groups['all'] }}"

- name: COMMON TASKS | add SSH fingerprint
  lineinfile:
    dest: "{{ pg_user_home }}/.ssh/known_hosts"
    create: yes
    state: present
    line: "{{ lookup('pipe', 'ssh-keyscan -t ecdsa-sha2-nistp256' + ' ' + item) }}"
  loop: "{{ groups['all'] }}"
